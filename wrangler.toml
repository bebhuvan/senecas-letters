#:schema node_modules/wrangler/config-schema.json
name = "senecas-letters"
main = "dist/_worker.js/index.js"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# Smart Placement — runs the worker closer to origin calls on dynamic routes
[placement]
mode = "smart"

# Observability — tail logs, metrics, sampled analytics
[observability]
enabled = true
head_sampling_rate = 1

# Custom domains
[[routes]]
pattern = "seneca.ink"
custom_domain = true

[[routes]]
pattern = "www.seneca.ink"
custom_domain = true